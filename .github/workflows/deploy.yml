# ─────────────────────────────────────────────────────────────────────────────
# Cloud Native DevOps Pipeline - GitHub Actions CI/CD
#
# SECRETS REQUIRED (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID      - IAM user access key
#   AWS_SECRET_ACCESS_KEY  - IAM user secret key
#   AWS_ACCOUNT_ID         - Your 12-digit AWS account ID
#
# VARIABLES REQUIRED (Settings → Variables → Actions):
#   AWS_REGION             - e.g. us-east-1
#   ECR_REPOSITORY         - cloudnative-monitor
#   EKS_CLUSTER_NAME       - cloudnative-devops-cluster
# ─────────────────────────────────────────────────────────────────────────────

name: Cloud Native DevOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger

env:
  AWS_REGION:       ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY:   ${{ vars.ECR_REPOSITORY || 'cloudnative-monitor' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'cloudnative-devops-cluster' }}
  TF_VERSION:       "1.7.0"
  IMAGE_TAG:        ${{ github.sha }}

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/requirements.txt   # FIX: point to correct path

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E501,W503

      - name: Run basic smoke test
        run: |
          python -c "
          from app import app
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          r2 = client.get('/api/metrics')
          assert r2.status_code == 200, f'Metrics API failed: {r2.status_code}'
          print('All tests passed.')
          "

  # ── Job 2: Build & Push to ECR ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        working-directory: src
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building image: ${IMAGE_URI}"
          docker build \
            --tag "${IMAGE_URI}" \
            --tag "${LATEST_URI}" \
            --label "git.sha=${IMAGE_TAG}" \
            --label "git.branch=${GITHUB_REF_NAME}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Image pushed: ${IMAGE_URI}"

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.image_uri }}
          format: table
          exit-code: 0   # Don't fail pipeline on findings (set to 1 in prod)
          severity: HIGH,CRITICAL

  # ── Job 3: Terraform ───────────────────────────────────────────────────────
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET || 'my-terraform-state-bucket' }}" \
            -backend-config="key=cloudnative-devops/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${AWS_REGION}" \
            -var="cluster_name=${EKS_CLUSTER_NAME}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ── Job 4: Deploy to Kubernetes ────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}"

      - name: Substitute image in deployment manifest
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_URI}|g" k8s/deployment.yaml
          echo "Deploying image: ${IMAGE_URI}"
          cat k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/cloudnative-monitor \
            --timeout=300s

      - name: Get service URL
        run: |
          echo "Waiting for LoadBalancer external IP..."
          for i in {1..15}; do
            EXTERNAL_IP=$(kubectl get svc cloudnative-monitor-svc \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "${EXTERNAL_IP}" ]; then
              echo "✅ App is live at: http://${EXTERNAL_IP}"
              break
            fi
            echo "Attempt ${i}/15 - waiting 10s..."
            sleep 10
          done

      - name: Verify deployment health
        run: |
          kubectl get pods -l app=cloudnative-monitor
          kubectl get svc cloudnative-monitor-svc
          kubectl describe deployment cloudnative-monitor

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "   Image: ${{ needs.build-and-push.outputs.image_uri }}"
          echo "   Commit: ${GITHUB_SHA}"
          echo "   Branch: ${GITHUB_REF_NAME}"

# ─────────────────────────────────────────────────────────────────────────────
# ALTERNATIVE: OIDC Authentication (no long-lived keys — recommended for prod)
#
# Replace the "Configure AWS credentials" step with:
#
#   - name: Configure AWS credentials (OIDC)
#     uses: aws-actions/configure-aws-credentials@v4
#     with:
#       role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
#       role-session-name: GitHubActions
#       aws-region: ${{ env.AWS_REGION }}
#
# And add to your GitHub Actions job:
#   permissions:
#     id-token: write
#     contents: read
# ─────────────────────────────────────────────────────────────────────────────