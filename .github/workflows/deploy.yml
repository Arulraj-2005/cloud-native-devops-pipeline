# ─────────────────────────────────────────────────────────────────────────────
# Cloud Native DevOps Pipeline - GitHub Actions CI/CD
# ─────────────────────────────────────────────────────────────────────────────

name: Cloud Native DevOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME:       cloudnative-monitor
  TF_VERSION:       "1.7.0"
  IMAGE_TAG:        ${{ github.sha }}
  AWS_REGION:       us-east-1
  EKS_CLUSTER_NAME: cloudnative-devops-cluster

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  test:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E501,W503,E302,E305

      - name: Run smoke tests
        run: |
          python -c "
          from app import app
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          r2 = client.get('/api/metrics')
          assert r2.status_code == 200, f'Metrics API failed: {r2.status_code}'
          print('All tests passed.')
          "

      - name: Test summary
        run: |
          echo "✅ Lint passed"
          echo "✅ /health returned 200"
          echo "✅ /api/metrics returned 200"
          echo "✅ All smoke tests passed"

  # ── Job 2: Build Docker Image ──────────────────────────────────────────────
  build:
    name: "Build Docker Image"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./src
          docker build -t ${{ env.IMAGE_NAME }}:latest ./src

      - name: Inspect image
        run: |
          docker image inspect ${{ env.IMAGE_NAME }}:latest \
            --format 'Size: {{.Size}} bytes | OS: {{.Os}} | Arch: {{.Architecture}}'

      - name: Build summary
        run: |
          echo "✅ Docker image built successfully"
          echo "   Image : ${{ env.IMAGE_NAME }}:latest"
          echo "   Image : ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "   Commit: ${{ github.sha }}"

  # ── Job 3: Terraform Validate ──────────────────────────────────────────────
  terraform:
    name: "Terraform Validate & Plan"
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Show planned resources
        run: |
          echo "✅ Terraform configuration is valid"
          echo ""
          echo "Resources that would be created:"
          grep "^resource" main.tf 2>/dev/null | awk '{gsub(/"/, "", $2); gsub(/"/, "", $3); print "   ✦", $2, "→", $3}' || echo "   (no resources found)"

  # ── Job 4: Kubernetes Validate ────────────────────────────────────────────
  k8s-validate:
    name: "Validate Kubernetes Manifests"
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate manifests with Python
        run: |
          python3 -c "
          import yaml, sys

          print('╔════════════════════════════════════════════════════════════════╗')
          print('║           Kubernetes Manifests Validation                      ║')
          print('╚════════════════════════════════════════════════════════════════╝')
          print('')

          files = ['k8s/deployment.yaml', 'k8s/service.yaml']

          # First pass: check YAML syntax
          for f in files:
              try:
                  with open(f) as fh:
                      content = fh.read().replace('IMAGE_PLACEHOLDER', 'nginx:latest')
                      docs = list(yaml.safe_load_all(content))
                      for doc in docs:
                          if doc:
                              print(f'✅ Valid YAML: {f} (kind: {doc.get(\"kind\", \"unknown\")})')
              except Exception as e:
                  print(f'❌ Invalid YAML: {f} - {e}')
                  sys.exit(1)

          print('')

          # Second pass: validate deployment configuration
          try:
              with open('k8s/deployment.yaml') as fh:
                  content = fh.read().replace('IMAGE_PLACEHOLDER', 'nginx:latest')
                  dep = yaml.safe_load(content)
          except Exception as e:
              print(f'❌ Failed to load deployment.yaml: {e}')
              sys.exit(1)

          # Deployment validations
          assert dep['kind'] == 'Deployment', 'Expected Deployment'
          assert dep['spec']['replicas'] == 2, 'Expected 2 replicas'
          assert dep['spec']['strategy']['type'] == 'RollingUpdate', 'Expected RollingUpdate'
          
          c = dep['spec']['template']['spec']['containers'][0]
          assert 'livenessProbe' in c, 'Missing livenessProbe'
          assert 'readinessProbe' in c, 'Missing readinessProbe'
          assert 'startupProbe' in c, 'Missing startupProbe'
          assert 'resources' in c, 'Missing resource limits'
          
          # Validate topology spread
          spec = dep['spec']['template']['spec']
          assert 'topologySpreadConstraints' in spec, 'Missing topology spread constraints'
          
          print('📋 Deployment configuration validated:')
          print(f'   ├─ Replicas        : {dep[\"spec\"][\"replicas\"]}')
          print(f'   ├─ Update strategy : RollingUpdate (maxUnavailable=0, maxSurge=1)')
          print(f'   ├─ Topology spread : {len(spec[\"topologySpreadConstraints\"])} constraints')
          print(f'   ├─ CPU request     : {c[\"resources\"][\"requests\"][\"cpu\"]}')
          print(f'   ├─ CPU limit       : {c[\"resources\"][\"limits\"][\"cpu\"]}')
          print(f'   ├─ Memory request  : {c[\"resources\"][\"requests\"][\"memory\"]}')
          print(f'   ├─ Memory limit    : {c[\"resources\"][\"limits\"][\"memory\"]}')
          print(f'   ├─ Liveness probe  : {c[\"livenessProbe\"][\"httpGet\"][\"path\"]}')
          print(f'   ├─ Readiness probe : {c[\"readinessProbe\"][\"httpGet\"][\"path\"]}')
          print(f'   └─ Startup probe   : {c[\"startupProbe\"][\"httpGet\"][\"path\"]}')
          
          print('')
          print('╔════════════════════════════════════════════════════════════════╗')
          print('║              ✅ All Kubernetes checks passed                   ║')
          print('╚════════════════════════════════════════════════════════════════╝')
          "

      - name: Validate service manifest
  run: |
    python3 -c "
    import yaml
    
    with open('k8s/service.yaml') as fh:
        # Read all YAML documents (separated by ---)
        docs = list(yaml.safe_load_all(fh))
    
    print(f'Found {len(docs)} YAML documents in service.yaml')
    print('')
    
    # First document should be Service
    svc = docs[0]
    assert svc['kind'] == 'Service', 'Expected Service, got ' + svc['kind']
    assert svc['spec']['type'] == 'LoadBalancer', 'Expected LoadBalancer'
    assert svc['spec']['ports'][0]['port'] == 80, 'Expected port 80'
    assert svc['spec']['ports'][0]['targetPort'] == 5000, 'Expected targetPort 5000'
    
    print('✅ Service manifest validated:')
    print(f'   ├─ Kind         : {svc[\"kind\"]}')
    print(f'   ├─ Type         : {svc[\"spec\"][\"type\"]}')
    print(f'   ├─ Port         : {svc[\"spec\"][\"ports\"][0][\"port\"]}')
    print(f'   └─ TargetPort   : {svc[\"spec\"][\"ports\"][0][\"targetPort\"]}')
    
    # Second document should be HorizontalPodAutoscaler
    if len(docs) >= 2:
        hpa = docs[1]
        assert hpa['kind'] == 'HorizontalPodAutoscaler', 'Expected HorizontalPodAutoscaler, got ' + hpa['kind']
        assert hpa['spec']['minReplicas'] == 2, 'Expected min replicas 2'
        assert hpa['spec']['maxReplicas'] == 4, 'Expected max replicas 4'
        
        print('')
        print('✅ HorizontalPodAutoscaler validated:')
        print(f'   ├─ Kind         : {hpa[\"kind\"]}')
        print(f'   ├─ Min replicas : {hpa[\"spec\"][\"minReplicas\"]}')
        print(f'   ├─ Max replicas : {hpa[\"spec\"][\"maxReplicas\"]}')
        print(f'   └─ CPU target   : 70% utilization')
    else:
        print('')
        print('⚠️  No HorizontalPodAutoscaler found (optional)')
    
    print('')
    print('✅ All service.yaml validation passed!')
    "

  # ── Job 5: Pipeline Summary ───────────────────────────────────────────────
  summary:
    name: "Pipeline Complete"
    runs-on: ubuntu-latest
    needs: [test, build, terraform, k8s-validate]

    steps:
      - name: Pipeline summary
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                                                                ║"
          echo "║        Cloud Native DevOps Pipeline — SUCCESS                  ║"
          echo "║                                                                ║"
          echo "╠════════════════════════════════════════════════════════════════╣"
          echo "║                                                                ║"
          echo "║  ✅ Lint & Tests passed                                        ║"
          echo "║  ✅ Docker image built                                         ║"
          echo "║  ✅ Terraform validated                                        ║"
          echo "║  ✅ Kubernetes manifests validated                             ║"
          echo "║                                                                ║"
          echo "╠════════════════════════════════════════════════════════════════╣"
          echo "║                                                                ║"
          echo "║  📦 Build Information                                          ║"
          echo "║     Commit    : ${{ github.sha }}"
          echo "║     Branch    : ${{ github.ref_name }}"
          echo "║     Author    : ${{ github.actor }}"
          echo "║     Region    : us-east-1"
          echo "║     Cluster   : cloudnative-devops-cluster"
          echo "║                                                                ║"
          echo "║  🛠️  Technology Stack                                         ║"
          echo "║     • Python Flask (Backend)                                   ║"
          echo "║     • Docker (Containerisation)                                ║"
          echo "║     • Terraform (Infrastructure as Code)                       ║"
          echo "║     • Kubernetes (Orchestration)                               ║"
          echo "║     • GitHub Actions (CI/CD)                                   ║"
          echo "║     • AWS (Target Cloud)                                       ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"