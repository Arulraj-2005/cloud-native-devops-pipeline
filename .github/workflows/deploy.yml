# ─────────────────────────────────────────────────────────────────────────────
# Cloud Native DevOps Pipeline - GitHub Actions CI/CD
# ─────────────────────────────────────────────────────────────────────────────

name: Cloud Native DevOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME:       cloudnative-monitor
  TF_VERSION:       "1.7.0"
  IMAGE_TAG:        ${{ github.sha }}
  AWS_REGION:       us-east-1
  EKS_CLUSTER_NAME: cloudnative-devops-cluster

jobs:
  # ── Job 1: Lint & Test ─────────────────────────────────────────────────────
  test:
    name: "✅ Lint & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E501,W503,E302,E305

      - name: Run smoke tests
        run: |
          python -c "
          from app import app
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200, f'Health check failed: {r.status_code}'
          r2 = client.get('/api/metrics')
          assert r2.status_code == 200, f'Metrics API failed: {r2.status_code}'
          print('All tests passed.')
          "

      - name: Test summary
        run: |
          echo "✅ Lint passed"
          echo "✅ /health returned 200"
          echo "✅ /api/metrics returned 200"
          echo "✅ All smoke tests passed"

  # ── Job 2: Build Docker Image ──────────────────────────────────────────────
  build:
    name: "✅ Build Docker Image"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./src
          docker build -t ${{ env.IMAGE_NAME }}:latest ./src

      - name: Inspect image
        run: |
          docker image inspect ${{ env.IMAGE_NAME }}:latest \
            --format 'Size: {{.Size}} bytes | OS: {{.Os}} | Arch: {{.Architecture}}'

      - name: Build summary
        run: |
          echo "✅ Docker image built successfully"
          echo "   Image : ${{ env.IMAGE_NAME }}:latest"
          echo "   Image : ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "   Commit: ${{ github.sha }}"

  # ── Job 3: Terraform Validate ──────────────────────────────────────────────
  terraform:
    name: "✅ Terraform Validate & Plan"
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Show planned resources
        run: |
          echo "✅ Terraform configuration is valid"
          echo ""
          echo "📦 Resources that would be created:"
          grep "^resource" main.tf | awk '{gsub(/"/, "", $2); gsub(/"/, "", $3); print "   ✦", $2, "→", $3}'

  # ── Job 4: Kubernetes Validate ────────────────────────────────────────────
  k8s-validate:
    name: "✅ Validate Kubernetes Manifests"
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Validate manifests
        run: |
          sed -i 's|IMAGE_PLACEHOLDER|nginx:latest|g' k8s/deployment.yaml
          kubectl apply --dry-run=client -f k8s/deployment.yaml
          kubectl apply --dry-run=client -f k8s/service.yaml

      - name: Show deployment config
        run: |
          echo "✅ All Kubernetes manifests are valid"
          echo ""
          echo "📦 Deployment configuration:"
          kubectl apply --dry-run=client -f k8s/deployment.yaml -o json \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          c = d['spec']['template']['spec']['containers'][0]
          print(f\"   Replicas  : {d['spec']['replicas']}\")
          print(f\"   Image     : {c['image']}\")
          print(f\"   CPU req   : {c['resources']['requests']['cpu']}\")
          print(f\"   CPU limit : {c['resources']['limits']['cpu']}\")
          print(f\"   Mem req   : {c['resources']['requests']['memory']}\")
          print(f\"   Mem limit : {c['resources']['limits']['memory']}\")
          print(f\"   Liveness  : {c['livenessProbe']['httpGet']['path']}\")
          print(f\"   Readiness : {c['readinessProbe']['httpGet']['path']}\")
          "

  # ── Job 5: Deploy Summary ─────────────────────────────────────────────────
  summary:
    name: "✅ Pipeline Complete"
    runs-on: ubuntu-latest
    needs: [test, build, terraform, k8s-validate]

    steps:
      - name: Pipeline summary
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║   Cloud Native DevOps Pipeline — SUCCESS     ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║                                              ║"
          echo "║  ✅  Lint & Tests passed                     ║"
          echo "║  ✅  Docker image built                      ║"
          echo "║  ✅  Terraform validated                     ║"
          echo "║  ✅  Kubernetes manifests validated          ║"
          echo "║                                              ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Commit : ${{ github.sha }}  ║"
          echo "║  Branch : ${{ github.ref_name }}            ║"
          echo "║  Author : ${{ github.actor }}               ║"
          echo "║  Region : us-east-1                         ║"
          echo "║  Cluster: cloudnative-devops-cluster        ║"
          echo "║                                              ║"
          echo "║  Stack  : Flask · Docker · Terraform        ║"
          echo "║           Kubernetes · GitHub Actions · AWS ║"
          echo "╚══════════════════════════════════════════════╝"